{% extends "base.html" %}
{% block title %}VigieRAM - Mon établissement{% endblock %}
{% block content %}
<h1 class="mb-4">Voir les statistiques de mon établissement</h1>
<form method="GET" class="card p-4 shadow-sm">
  <div class="mb-3">
    <label class="form-label">Nom de l'établissement (exactement comme saisi précédemment)</label>
    <input type="text" name="facility_name" class="form-control" placeholder="ex: CHU Bouaké" required>
  </div>
  <button type="submit" class="btn btn-primary">Afficher</button>
</form>
<p class="mt-3"><a href="/">← Retour à la saisie</a></p>
{% endblock %}
